# Reusable child: builds one NRSampleApp APK against a specific NRVA release.
#
# Contract with the caller:
#   - Input `nrva_version` is a bare version string like "4.3.0" (no leading v).
#   - Output is a single artifact named `playback-app-<version>` containing
#     app-playback-release-unsigned.apk. The test workflow downloads this by
#     the same name.
#
# Design note: we don't build against the local module sources on this branch
# because we want the test to exercise the *published* NRVA artifact for that
# version, not whatever HEAD looks like. The build swaps in JitPack coordinates
# for the four modules and disables `include ':NR*'` in settings.gradle.

name: playback-build

on:
  workflow_call:
    inputs:
      nrva_version:
        required: true
        type: string
      run_id:
        required: true
        type: string
    secrets:
      NEW_RELIC_APP_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checks out this fork at the ref that triggered the master workflow.
      # This gives us the scenario-mode sample-app code (SCENARIO_ID intent
      # handling, per-scenario finish sentinels, NRVideo global attribute
      # tagging) that upstream v<version> tags don't carry.
      #
      # The sample-app *source* is the fork's; the NRVA *library* is swapped to
      # the published artifact of the matrix version in the "Use published NRVA
      # artifacts" step below, so the APK really runs NRVA <nrva_version> and
      # telemetry is attributable to a real version-under-test.
      - name: Checkout this fork
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure sample app for CI build
        # The sample app reads NR_APPLICATION_TOKEN via local.properties. If
        # the secret is absent we still want the build to succeed — the app
        # will just fail to send telemetry, which surfaces as a zero-event
        # leg in the summary. That's a clearer signal than a red build.
        run: |
          set -euo pipefail
          {
            echo "nr.applicationToken=${{ secrets.NEW_RELIC_APP_TOKEN }}"
            echo "nr.qoeAggregate=true"
          } > local.properties

          # Older tags (4.1.x) did not include the MediaTailor module and its
          # associated sample activity. Guard the ssai-mediatailor scenario at
          # runtime rather than failing the build.
          if ! grep -q "NRMediaTailorTracker" settings.gradle 2>/dev/null; then
            echo "NRVA_HAS_MEDIATAILOR=false" >> "$GITHUB_ENV"
          else
            echo "NRVA_HAS_MEDIATAILOR=true" >> "$GITHUB_ENV"
          fi

      # Swap the local NRVA module sources for the *published* JitPack artifacts
      # of the matrix version, so the APK really runs NRVA <nrva_version> (not
      # fork HEAD). The sample-app source stays the fork's (scenario-mode
      # instrumentation); only the linked library changes.
      #
      # MediaTailor was first published as a JitPack artifact at v4.3.1. For
      # older versions there is no NRMediaTailorTracker:<v> to resolve, so we
      # build against the three modules that exist and strip the MediaTailor
      # sample activity (and its ssai scenario) so the app still compiles. The
      # ssai leg then reports skipped rather than failing the build.
      - name: Use published NRVA artifacts for ${{ inputs.nrva_version }}
        run: |
          set -euo pipefail
          V="v${{ inputs.nrva_version }}"
          GRP="com.github.newrelic.video-agent-android"
          APP=app/src/main/java/com/newrelic/nrvideoproject
          MAIN="$APP/MainActivity.java"
          MANIFEST=app/src/main/AndroidManifest.xml

          # HAS_MT = (nrva_version >= 4.3.1). sort -V puts the lower version
          # first; if that's 4.3.1 then the matrix version is >= 4.3.1.
          if [ "$(printf '%s\n' 4.3.1 "${{ inputs.nrva_version }}" | sort -V | head -1)" = "4.3.1" ]; then
            HAS_MT=true
          else
            HAS_MT=false
          fi

          MODULES="NewRelicVideoCore NRExoPlayerTracker NRIMATracker"
          [ "$HAS_MT" = true ] && MODULES="$MODULES NRMediaTailorTracker"

          for M in $MODULES; do
            sed -i "s#implementation project(path: ':${M}')#implementation '${GRP}:${M}:${V}'#" app/build.gradle
            sed -i "/include ':${M}'/d" settings.gradle
          done

          if [ "$HAS_MT" != true ]; then
            # No published MediaTailor for this version: drop the dep, the
            # module include, the sample activity, and its references so the
            # app compiles. The ssai scenario writes a skip sentinel instead of
            # launching a class that no longer exists.
            sed -i "/implementation project(path: ':NRMediaTailorTracker')/d" app/build.gradle
            sed -i "/include ':NRMediaTailorTracker'/d" settings.gradle
            rm -f "$APP/VideoPlayerMediaTailor.java"
            sed -i 's/return VideoPlayerMediaTailor\.class;/return VideoPlayer.class;/' "$MAIN"
            sed -i 's/target = VideoPlayerMediaTailor\.class; url = "";.*break;/writeSentinel(scenarioId, "skipped-no-mediatailor-in-version"); finishAndRemoveTask(); return;/' "$MAIN"
            perl -0pi -e 's/\s*<activity\s+android:name="\.VideoPlayerMediaTailor".*?\/>//s' "$MANIFEST"
          fi

          # Published artifacts live on JitPack, but only `buildscript` lists it
          # — `allprojects.repositories` (where app deps resolve) has just
          # google()+mavenCentral(). Add jitpack after every mavenCentral so the
          # swapped coordinates resolve. Duplicate in buildscript is a no-op.
          sed -i "s#mavenCentral()#mavenCentral()\n        maven { url 'https://jitpack.io' }#g" build.gradle

          echo "--- HAS_MT=$HAS_MT  version=${{ inputs.nrva_version }} ---"
          echo "--- app/build.gradle NRVA deps ---"; grep "$GRP" app/build.gradle
          echo "--- settings.gradle ---"; cat settings.gradle

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ inputs.nrva_version }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ inputs.nrva_version }}-
            gradle-${{ runner.os }}-

      - name: Assemble sample app (debug)
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          # `assembleDebug` is used instead of `assembleRelease` because a
          # release APK from `assembleRelease` is unsigned by default —
          # Android on API 24+ refuses to install with
          # INSTALL_PARSE_FAILED_NO_CERTIFICATES. Debug builds are auto-
          # signed with the Android SDK's debug keystore, so no signing
          # config is needed in the workflow. Debug also carries more
          # verbose Log.v output that helps when debugging a failing leg.
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced. Check the assembleRelease step."
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: playback-app-${{ inputs.nrva_version }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7
          if-no-files-found: error
